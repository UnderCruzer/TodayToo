steps:
  # 1. 빌드
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/oneuldo-web:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/oneuldo-web:latest"
      - "-f"
      - "apps/web/Dockerfile"
      - "."

  # 2. 푸시
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/oneuldo-web"

  # 3. Cloud Run 배포 — 도쿄 리전 (일본 메인)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - oneuldo-web
      - "--image=gcr.io/$PROJECT_ID/oneuldo-web:$SHORT_SHA"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production"
      - "--set-secrets=SUPABASE_URL=oneuldo-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=oneuldo-supabase-key:latest,GEMINI_API_KEY=oneuldo-gemini-key:latest,CRON_SECRET=oneuldo-cron-secret:latest,LINE_CHANNEL_ACCESS_TOKEN=oneuldo-line-token:latest,LINE_CHANNEL_SECRET=oneuldo-line-secret:latest,RESEND_API_KEY=oneuldo-resend-key:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

images:
  - "gcr.io/$PROJECT_ID/oneuldo-web:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/oneuldo-web:latest"
